site_name: MLSys 菜狗自学笔记
site_description: MLSys 自学笔记，知乎同步更新
site_url: https://zoey-cheng.github.io/MLSys-Learning-Notes/
repo_url: https://github.com/Zoey-Cheng/MLSys-Learning-Notes
repo_name: Zoey-Cheng/MLSys-Learning-Notes

docs_dir: docs
use_directory_urls: false   # 让 URL 是 .html 而非目录，使 ../assets/ 相对路径正常解析

watch:
  - notes
  - assets

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.follow               # 右侧 TOC 跟随阅读位置
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式

# nav 由 awesome-pages 插件根据文件结构 + .pages 文件 + 各 md 的 front-matter title 自动生成
# 改文件名前缀只影响排序，不用动 mkdocs.yml；改文件 front-matter 的 title 直接反映到 nav

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false         # 不要 ¶ 锚点（heading id 仍然会生成，右侧 TOC 跳转正常）
      marker: '[toc]'          # 兼容 Typora 风格的小写 marker

extra_javascript:
  - javascripts/katex.js
  - javascripts/expand-first-topic-on-home.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - zh
        - en
  - awesome-pages
